# Local development overrides
version: '3.9'

services:
  api:
    command: pnpm --filter @launchctrl/api dev
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug

  bot:
    command: pnpm --filter @launchctrl/bot dev
    environment:
      NODE_ENV: development

  miniapp:
    command: pnpm --filter @launchctrl/miniapp dev
    environment:
      NODE_ENV: development
