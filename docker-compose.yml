version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: launchctrl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: launchctrl
      POSTGRES_PASSWORD: launchctrl
      POSTGRES_DB: launchctrl
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U launchctrl']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: launchctrl_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: launchctrl_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://launchctrl:launchctrl@postgres:5432/launchctrl
      REDIS_URL: redis://redis:6379
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
      target: development
    container_name: launchctrl_bot
    restart: unless-stopped
    env_file: .env
    ports:
      - '3002:3002'
    volumes:
      - ./apps/bot/src:/app/apps/bot/src
      - ./packages:/app/packages
    depends_on:
      - api

  miniapp:
    build:
      context: .
      dockerfile: apps/miniapp/Dockerfile
      target: development
    container_name: launchctrl_miniapp
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    volumes:
      - ./apps/miniapp/src:/app/apps/miniapp/src
      - ./packages:/app/packages
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
